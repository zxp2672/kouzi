# 宝塔面板 Nginx 反向代理配置
# 使用方法：在宝塔面板中添加网站后，将此配置复制到网站的配置文件中

# 将 YOUR_DOMAIN_OR_IP 替换为你的域名或服务器 IP
# 将 APP_PORT 替换为你的应用端口（默认 3000）

server
{
    listen 80;
    # 如果有域名，取消下面的注释并替换为你的域名
    # server_name your-domain.com www.your-domain.com;
    server_name _;
    
    # 日志配置
    access_log /www/wwwlogs/warehouse-system-access.log;
    error_log /www/wwwlogs/warehouse-system-error.log;
    
    # 最大上传文件大小
    client_max_body_size 50M;
    
    # Gzip 压缩配置
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml application/xml+rss text/javascript image/jpeg image/gif image/png;
    gzip_vary on;
    gzip_proxied any;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    
    # 代理超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # 反向代理配置
    location / {
        proxy_pass http://127.0.0.1:3000;  # 将 3000 改为你的应用端口
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 传递客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 禁用缓存
        proxy_cache off;
    }
    
    # 静态资源缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        proxy_pass http://127.0.0.1:3000;  # 将 3000 改为你的应用端口
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # API 接口不缓存
    location /api/ {
        proxy_pass http://127.0.0.1:3000;  # 将 3000 改为你的应用端口
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # API 不缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
    
    # 安全头配置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 健康检查接口（可选）
    location /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}

